<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="spinning_cube.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="cube">
            <div class="top">1</div>
            <div class="right">2</div>
            <div class="bottom">3</div>
            <div class="left">4</div>
            <div class="back">5</div>
            <div class="front">6</div>
        </div>

        <div class="nada"></div>

        <button class="rotateButton" type="button" id="girarBtn">Alternar Rotação Automatica</button>
        <button class="rotateButton" type="button" id="hideButton" onclick="hide()">Alternar Esconder/Mostrar</button>
        
    </div>

</body>
</html>
